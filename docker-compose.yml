version: '3.8'

services:
  # TimescaleDB (PostgreSQL + Time-series)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: productivity_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-productivity_assassin}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  # Redis (Cache & Queue)
  redis:
    image: redis:alpine
    container_name: productivity_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    restart: unless-stopped

  # PGAdmin (Optional - Database GUI)
  pgadmin:
    image: dpage/pgadmin4
    container_name: productivity_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - app_network
    restart: unless-stopped
    depends_on:
      - timescaledb

volumes:
  db_data:
  redis_data:

networks:
  app_network:
    driver: bridge
