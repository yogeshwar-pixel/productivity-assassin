<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Productivity Assassin</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #00ff99;
    }
    .status {
      padding: 12px;
      background: #2a2a2a;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .label {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .value {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover {
      background: #00dd88;
    }
    .distraction {
      color: #ff3333;
      font-weight: bold;
    }
    .productive {
      color: #00ff99;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>🎯 Productivity Assassin</h2>
  
  <div class="status">
    <div class="label">Current Site:</div>
    <div class="value" id="current-domain">Loading...</div>
  </div>
  
  <div class="status">
    <div class="label">Status:</div>
    <div class="value" id="status">Checking...</div>
  </div>
  
  <div class="status">
    <div class="label">Page Title:</div>
    <div class="value" id="page-title" style="font-size: 12px;">-</div>
  </div>
  
  <button id="focus-toggle">Enable Focus Mode</button>
  
  <script src="popup.js"></script>
</body>
</html>
